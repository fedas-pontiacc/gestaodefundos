<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo Familiar - Eventos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-calendar-alt"></i> Eventos Familiares</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="eventos.html" class="active">Eventos</a>
        </nav>
    </header>

    <main>
        <section class="cadastro-evento">
            <h2>Adicionar Novo Evento</h2>
            <form id="form-evento">
                <div class="form-group">
                    <label for="tipo">Tipo:</label>
                    <select id="tipo" required>
                        <option value="Aniversário">Aniversário</option>
                        <option value="Sentada">Sentada</option>
                        <option value="Missa">Missa</option>
                        <option value="Viagem">Viagem</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="data">Data:</label>
                    <input type="date" id="data" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" rows="2" placeholder="Ex: Aniversário da Ana..."></textarea>
                </div>
                <button type="submit"><i class="fas fa-plus-circle"></i> Adicionar Evento</button>
            </form>
        </section>

        <section class="lista-eventos">
            <h2><i class="fas fa-list"></i> Próximos Eventos</h2>
            <div id="eventos-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        carregarEventos();
        document.getElementById('form-evento').addEventListener('submit', adicionarEvento);
    </script>
</body>
</html>
