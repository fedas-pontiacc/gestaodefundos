<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo Familiar - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-coins"></i> Fundo Familiar</h1>
        <nav>
            <a href="index.html" class="active">Dashboard</a>
            <a href="eventos.html">Eventos</a>
        </nav>
    </header>

    <main>
        <section class="resumo">
            <h2>Resumo do Fundo</h2>
            <div class="total-card">
                <p>Total Acumulado</p>
                <span id="total-acumulado">0</span> MT
            </div>
        </section>

        <section class="membros">
            <h2><i class="fas fa-users"></i> Membros e Contribuições</h2>
            <div id="lista-membros" class="membros-lista"></div>
        </section>

        <!-- NOVO: Formulário para adicionar membro -->
        <section class="adicionar-membro">
            <h2><i class="fas fa-user-plus"></i> Adicionar Novo Membro</h2>
            <form id="form-adicionar-membro">
                <div class="form-group">
                    <label for="novo-nome">Nome do membro:</label>
                    <input type="text" id="novo-nome" placeholder="Ex: Carlos" required>
                </div>
                <button type="submit"><i class="fas fa-plus-circle"></i> Adicionar</button>
            </form>
        </section>

        <section class="historico">
            <h2><i class="fas fa-history"></i> Histórico de Depósitos</h2>
            <table id="tabela-historico">
                <thead>
                    <tr>
                        <th>Membro</th>
                        <th>Mês</th>
                        <th>Ano</th>
                        <th>Valor (MT)</th>
                    </tr>
                </thead>
                <tbody id="historico-corpo"></tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Inicializar e carregar dados na página
        carregarMembros();
        carregarHistorico();
        atualizarTotal();

        // Evento para o formulário de novo membro
        document.getElementById('form-adicionar-membro')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const nomeInput = document.getElementById('novo-nome');
            const nome = nomeInput.value.trim();
            if (nome === '') {
                alert('Por favor, insira um nome.');
                return;
            }
            adicionarMembro(nome);
            nomeInput.value = '';
        });
    </script>
</body>
</html>
